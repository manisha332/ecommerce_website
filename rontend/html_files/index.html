<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Platform</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">ShopEase</div>
        
        <div class="search-container">
            <input type="text" list="product-suggestions" placeholder="Search for products..." class="search-input">
            <datalist id="product-suggestions">
                <option value="Wireless Headphones"></option>
                <option value="Smart Watch"></option>
                <option value="Running Shoes"></option>
                <option value="Bluetooth Speaker"></option>
                <option value="Laptop Backpack"></option>
            </datalist>
            <button class="btn-search">Search</button>
        </div>

        <nav>
            <a href="#">Dashboard</a>
            <a href="#">My Orders</a>
            <a href="#">Cart</a>
            <a href="#" class="btn-logout">Logout</a>
        </nav>
    </header>

    <!-- User Dashboard Section -->
    <main class="container user-dashboard">
        <h2>Latest Products</h2>
        <!-- The product-grid will be cleared and populated dynamically by fetch() -->
        <div class="product-grid" id="product-grid">
            <p>Loading products...</p>
        </div>
    </main>

    <hr class="divider">

    <!-- Admin Panel Section -->
    <main class="container admin-dashboard">
        <h2>Admin Panel</h2>
        <div class="admin-controls">
            <button class="btn-secondary">Add New Product</button>
            <button class="btn-secondary">View All Customers</button>
            <button class="btn-secondary">View All Orders</button>
        </div>

        <div class="admin-data-table">
            <h3>Recent Orders</h3>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="orders-table-body">
                    <tr>
                        <td>#ORD-001</td>
                        <td>Rahul Kumar</td>
                        <td>₹1,999</td>
                        <td><span class="badge status-pending">Pending</span></td>
                    </tr>
                    <tr>
                        <td>#ORD-002</td>
                        <td>Priya Sharma</td>
                        <td>₹3,798</td>
                        <td><span class="badge status-shipped">Shipped</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="../script.js"></script>
</body>
</html>
